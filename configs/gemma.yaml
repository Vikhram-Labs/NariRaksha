model_id: "google/gemma-2-2b"
output_dir: "models/nariraksha-gemma2-2b"
dataset_path: "datasets/synthetic/nariraksha_synthetic.jsonl"

# QLoRA parameters
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

# Training parameters
batch_size: 4
grad_accum: 4
learning_rate: 2e-4
max_steps: 2000
save_steps: 200
logging_steps: 10
max_seq_length: 2048
