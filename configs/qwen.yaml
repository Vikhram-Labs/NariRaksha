model_id: "Qwen/Qwen2.5-3B"
output_dir: "models/nariraksha-qwen3-3b"
dataset_path: "datasets/synthetic/nariraksha_synthetic.jsonl"

# QLoRA parameters
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Training parameters
batch_size: 2
grad_accum: 8
learning_rate: 2e-4
max_steps: 2000
save_steps: 200
logging_steps: 10
max_seq_length: 2048
